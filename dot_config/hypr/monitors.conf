# Example formats:
# monitor=DP-1,1920x1080@144,0x0,1
# monitor=eDP-1,2560x1440@165,0x0,1.25
# monitor=,preferred,auto,1

env = GDK_SCALE,1
monitor=,preferred,auto,1
monitor=DP-2, 1920x1080@60, 0x0, 1 # main monitor
monitor=DP-1, 1920x1080@60, 1920x-730, 1, transform, 3  # vertical monitor

workspace = name:vertical,monitor:DP-1,default:true,persistent:true
