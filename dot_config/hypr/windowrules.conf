# Window Rules Configuration

# Example windowrule v1
# windowrule = float, ^(kitty)$
# Example windowrule v2
# windowrulev2 = float,class:^(kitty)$,title:^(kitty)$
# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
windowrulev2 = suppressevent maximize, class:.* # You'll probably like this.

# dog-menu
windowrulev2 = float,class:^(dog-menu)$
windowrulev2 = center,class:^(dog-menu)$
windowrulev2 = size 800 600,class:^(dog-menu)$

# Bitwarden
windowrulev2 = float,class:^(chrome-nngceckbapebfimnlniiiahkandclblb-Default)$
windowrulev2 = center,class:^(chrome-nngceckbapebfimnlniiiahkandclblb-Default)$
windowrulev2 = size 20% 40%,class:^(chrome-nngceckbapebfimnlniiiahkandclblb-Default)$

# Nautilus
windowrulev2 = float,class:^(org.gnome.Nautilus)$
windowrulev2 = center,class:^(org.gnome.Nautilus)$
windowrulev2 = size 800 600,class:^(org.gnome.Nautilus)$

# Kitty
windowrulev2 = float,class:^(kitty)$
windowrulev2 = center,class:^(kitty)$
windowrulev2 = size 800 600,class:^(kitty)$

# Todoist
windowrulev2 = float,class:^(Todoist)$
windowrulev2 = center,class:^(Todoist)$
windowrulev2 = size 800 600,class:^(Todoist)$
