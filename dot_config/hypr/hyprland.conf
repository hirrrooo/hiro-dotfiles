########################################################################################
# AUTOGENERATED HYPRLAND CONFIG.
# PLEASE USE THE CONFIG PROVIDED IN THE GIT REPO /examples/hypr.conf AND EDIT IT,
# OR EDIT THIS ONE ACCORDING TO THE WIKI INSTRUCTIONS.
########################################################################################

#
# Please note not all available settings / options are set here.
# For a full list, see the wiki
#


# See https://wiki.hyprland.org/Configuring/Keywords/ for more

# Execute your favorite apps at launch
exec-once = qs -c noctalia-shell
exec-once = nm-applet &
exec-once = blueman-applet &
exec-once = hyprctl setcursor Notwaita-Gray 24 &
exec-once = gsettings set org.gnome.desktop.interface cursor-theme 'Notwaita-Gray' &
exec-once = /usr/libexec/polkit-gnome-authentication-agent-1 &
exec-once = gnome-keyring-daemon --start --components=secrets &

# Warmup distrobox (dog-box)
exec-once = podman start dog-box

# First Boot Setup (DogOS)
exec-once = sh -c "if [ ! -f $HOME/.config/dog-os-setup.done ]; then kitty --hold sh -c 'ujust setup-os && touch $HOME/.config/dog-os-setup.done && echo \"Setup complete!\" && kitty --class dog-menu -e dog-menu'; fi"

# Set programs that you use
$terminal = kitty
$fileManager = nautilus
$browser = helium-browser
$music = com.spotify.Client
$notes = md.obsidian.Obsidian

# Some default env vars.
env = XCURSOR_SIZE,24
env = XCURSOR_THEME,Notwaita-Gray
env = HYPRCURSOR_SIZE,24
env = HYPRCURSOR_THEME,Notwaita-Gray
env = QT_QPA_PLATFORMTHEME,qt6ct
env = PATH,$HOME/.local/bin:$PATH

# Layouts
dwindle {
    # See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
    pseudotile = yes # master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = yes # you probably want this
}


# Source external configuration files
source = ~/.config/hypr/input.conf
source = ~/.config/hypr/looknfeel.conf
source = ~/.config/hypr/monitors.conf
source = ~/.config/hypr/windowrules.conf
source = ~/.config/hypr/keybinds.conf

source = /var/home/hiro/.config/hypr/noctalia/noctalia-colors.conf
