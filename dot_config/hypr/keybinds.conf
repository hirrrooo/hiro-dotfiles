# Keybinds Configuration

# See https://wiki.hyprland.org/Configuring/Keywords/ for more
$mainMod = SUPER
$ipc = qs -c noctalia-shell ipc call

# Reboot to Windows popup
bind = $mainMod SHIFT, W, exec, kitty --class boot-windows -T "Boot Windows" ujust boot-windows

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $mainMod, T, exec, $terminal
bind = $mainMod, Q, killactive,
bind = $mainMod SHIFT, M, exit,
bind = CTRL SHIFT, Escape, exec, kitty --class dog-menu -e dog-menu
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, F, togglefloating,
bind = $mainMod, N, exec, flatpak run md.obsidian.Obsidian
bind = $mainMod, M, exec, flatpak run $music
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, B, exec, $browser
# bind = $mainMod, L, exec, hyprlock # Lock screen

# Fake Fullscreen for browsers
bind = $mainMod SHIFT, F, fullscreenstate, 0 3
bind = $mainMod SHIFT, G, fullscreenstate, 2

# Next/Previous Workspace
bind = $mainMod, S, exec, ~/.config/hypr/scripts/dp1-scroll.sh next
bind = $mainMod, A, exec, ~/.config/hypr/scripts/dp1-scroll.sh prev

# Noctalia Bindings
bind = $mainMod, SPACE, exec, $ipc launcher toggle
bind = $mainMod, C, exec, $ipc controlCenter toggle
bind = $mainMod, comma, exec, $ipc settings toggle
bindel = , XF86AudioRaiseVolume, exec, $ipc volume increase
bindel = , XF86AudioLowerVolume, exec, $ipc volume decrease
bindl = , XF86AudioMute, exec, $ipc volume muteOutput
bind = $mainMod, V, exec, $ipc launcher clipboard
bind = $mainMod, L, exec, $ipc lockScreen lock

# Screenshot with Grim + Slurp
bind = , print, exec, grim $(xdg-user-dir PICTURES)/Screenshots/$(date +'%s_grim.png')
bind = CTRL, print, exec, grim -g "$(slurp -o)" $(xdg-user-dir PICTURES)/Screenshots/$(date +'%s_grim.png')
bind = $mainMod SHIFT, S, exec, ~/.config/hypr/scripts/screenshot.sh

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
# bind = $mainMod, TAB, togglespecialworkspace, magic
# bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86_AudioPlay, exec, playerctl play-pause
# bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
